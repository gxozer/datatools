# external-secret.yaml  (staging)
#
# An ExternalSecret tells ESO (External Secrets Operator):
#   - WHERE to read secrets from (which Secrets Manager paths)
#   - HOW to compose the final key-value pairs (via target.template)
#   - WHERE to write them (which Kubernetes Secret to create/update)
#
# DATABASE_URL is composed at sync time from the RDS-managed secret
# (rds!db-hello-login-staging-admin). RDS keeps that secret current across
# password rotations, so DATABASE_URL never goes stale.
# The remaining secrets (JWT_SECRET, MAIL_*) are read from hello-login/staging,
# which is populated manually and does not change on RDS rotation.
#
# Acronyms:
#   ESO  — External Secrets Operator
#   CRD  — Custom Resource Definition
#   JWT  — JSON Web Token

apiVersion: external-secrets.io/v1beta1   # v1beta1 required for ESO v0.9.x
kind: ExternalSecret
metadata:
  name: hello-login-secrets

spec:
  # refreshInterval — how often ESO re-reads both secrets from AWS Secrets Manager.
  # "1h" means the app picks up a rotated RDS password within 1 hour
  # (pods may need a restart to reload environment variables after the Secret updates).
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager   # ClusterSecretStore defined in base/cluster-secret-store.yaml
    kind: ClusterSecretStore

  target:
    name: hello-login-secrets   # Kubernetes Secret consumed by pods via envFrom.secretRef

    # mergePolicy: Replace — only the keys defined in template.data appear in the
    # resulting Kubernetes Secret. The raw extracted fields (username, password,
    # host, port, dbname, DATABASE_URL) do NOT leak into the Secret as-is.
    template:
      mergePolicy: Replace
      data:
        # DATABASE_URL is composed from the RDS-managed secret fields at sync time.
        # The RDS-managed secret (rds!db-hello-login-staging-admin) always holds the
        # current password — AWS updates it on every rotation.
        # Template syntax: Go text/template — .username etc. are keys from dataFrom below.
        DATABASE_URL: "mysql+pymysql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"

        # Non-database secrets passed through from the manually-populated app secret.
        JWT_SECRET:           "{{ .JWT_SECRET }}"
        MAIL_PASSWORD:        "{{ .MAIL_PASSWORD }}"
        MAIL_USERNAME:        "{{ .MAIL_USERNAME }}"
        MAIL_DEFAULT_SENDER:  "{{ .MAIL_DEFAULT_SENDER }}"

  # dataFrom.extract pulls ALL key-value pairs from each secret and makes them
  # available as template variables. Two secrets are extracted:
  #   1. rds!db-hello-login-staging-admin — fields: username, password, host, port, dbname
  #   2. hello-login/staging              — fields: JWT_SECRET, MAIL_PASSWORD, MAIL_USERNAME,
  #                                         MAIL_DEFAULT_SENDER (and any others — unused ones
  #                                         are discarded by mergePolicy: Replace)
  dataFrom:
    - extract:
        key: rds!db-hello-login-staging-admin   # RDS-managed secret; AWS rotates the password here
    - extract:
        key: hello-login/staging                # manually-populated app secret for non-DB values
