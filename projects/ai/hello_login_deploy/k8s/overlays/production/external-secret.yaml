# external-secret.yaml  (production)
#
# Identical structure to the staging ExternalSecret, but reads from the
# PRODUCTION secret path in AWS Secrets Manager (hello-login/production).
#
# The resulting Kubernetes Secret (hello-login-secrets) is created in the
# hello-login-production namespace and contains production credentials —
# completely separate from the staging Secret.
#
# See k8s/overlays/staging/external-secret.yaml for full field explanations.

apiVersion: external-secrets.io/v1beta1   # v1beta1 required for ESO v0.9.x
kind: ExternalSecret
metadata:
  name: hello-login-secrets

spec:
  # Refresh every hour — same as staging. Production secrets are also rotated
  # via AWS Secrets Manager, and ESO picks up the new values within 1 hour.
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: hello-login-secrets   # Kubernetes Secret written into hello-login-production namespace

  data:
    # All five secrets read from hello-login/production (the production Secrets Manager path
    # created by terraform/modules/secrets/main.tf with environment="production").
    - secretKey: DATABASE_URL
      remoteRef:
        key: hello-login/production   # production path — different credentials from staging
        property: DATABASE_URL

    - secretKey: JWT_SECRET
      remoteRef:
        key: hello-login/production
        property: JWT_SECRET

    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: hello-login/production
        property: MAIL_PASSWORD

    - secretKey: MAIL_USERNAME
      remoteRef:
        key: hello-login/production
        property: MAIL_USERNAME

    - secretKey: MAIL_DEFAULT_SENDER
      remoteRef:
        key: hello-login/production
        property: MAIL_DEFAULT_SENDER
