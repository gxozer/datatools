# external-secret.yaml  (staging)
#
# An ExternalSecret is a custom resource (CRD) introduced by the ESO
# (External Secrets Operator). It tells ESO:
#   - WHERE to read the secret from (which store and which path in AWS Secrets Manager)
#   - WHAT to read (which properties/fields within the secret)
#   - WHERE to write it (which Kubernetes Secret to create/update)
#
# ESO watches this resource and syncs the values on the schedule defined by
# refreshInterval. The resulting Kubernetes Secret is consumed by pods via
# envFrom.secretRef in backend-deployment.yaml.
#
# Acronyms:
#   ESO  — External Secrets Operator
#   CRD  — Custom Resource Definition
#   JWT  — JSON Web Token (used in the secret)

apiVersion: external-secrets.io/v1beta1   # v1beta1 required for ESO v0.9.x
kind: ExternalSecret
metadata:
  name: hello-login-secrets   # the name of THIS ExternalSecret resource (not the output Secret)

spec:
  # refreshInterval — how often ESO re-reads the secret from AWS Secrets Manager
  # and updates the Kubernetes Secret. "1h" = every 1 hour.
  # If the secret value is rotated in AWS, pods see the new value within 1 hour
  # (they may need a restart to pick up the new environment variable).
  refreshInterval: 1h

  # secretStoreRef — which ClusterSecretStore to use for connecting to AWS.
  # References the store defined in base/cluster-secret-store.yaml.
  secretStoreRef:
    name: aws-secrets-manager   # must match metadata.name in cluster-secret-store.yaml
    kind: ClusterSecretStore    # cluster-scoped store (available to all namespaces)

  # target — the Kubernetes Secret that ESO creates/updates with the synced values.
  target:
    name: hello-login-secrets   # the Kubernetes Secret name that pods reference in envFrom.secretRef

  # data — the list of individual secret values to sync.
  # Each entry reads one property from the AWS Secrets Manager secret JSON
  # and writes it as a key in the Kubernetes Secret.
  data:
    # DATABASE_URL — the full MySQL connection string including host, user, password, db name.
    # Format: mysql+pymysql://admin:<password>@<rds-endpoint>/hello_login
    - secretKey: DATABASE_URL        # key name in the resulting Kubernetes Secret
      remoteRef:
        key: hello-login/staging     # the Secrets Manager secret path (created by Terraform)
        property: DATABASE_URL       # the JSON field within that secret

    # JWT_SECRET — the secret key used to sign and verify JWT (JSON Web Token) tokens
    # for user authentication. Must be a long random string.
    - secretKey: JWT_SECRET
      remoteRef:
        key: hello-login/staging
        property: JWT_SECRET

    # MAIL_PASSWORD — the SMTP password for the mail relay service (Brevo/Sendinblue).
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: hello-login/staging
        property: MAIL_PASSWORD

    # MAIL_USERNAME — the SMTP username / login for the mail relay service.
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: hello-login/staging
        property: MAIL_USERNAME

    # MAIL_DEFAULT_SENDER — the "From" email address shown in outgoing emails.
    - secretKey: MAIL_DEFAULT_SENDER
      remoteRef:
        key: hello-login/staging
        property: MAIL_DEFAULT_SENDER
