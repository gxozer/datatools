# Dev ingress using Traefik — the ingress controller bundled with k3s.
# Change ingressClassName to "nginx" if using kind with nginx ingress controller.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-login-ingress

spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
