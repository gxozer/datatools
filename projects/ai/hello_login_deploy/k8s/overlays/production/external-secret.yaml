# external-secret.yaml  (production)
#
# Identical structure to the staging ExternalSecret, but reads from production
# Secrets Manager paths (rds!db-hello-login-production-admin and hello-login/production).
#
# DATABASE_URL is composed from the RDS-managed secret at sync time, so it
# stays current across AWS-initiated password rotations with no manual intervention.
#
# See k8s/overlays/staging/external-secret.yaml for full field explanations.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hello-login-secrets

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: hello-login-secrets

    template:
      mergePolicy: Replace
      data:
        DATABASE_URL: "mysql+pymysql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
        JWT_SECRET:           "{{ .JWT_SECRET }}"
        MAIL_PASSWORD:        "{{ .MAIL_PASSWORD }}"
        MAIL_USERNAME:        "{{ .MAIL_USERNAME }}"
        MAIL_DEFAULT_SENDER:  "{{ .MAIL_DEFAULT_SENDER }}"

  dataFrom:
    - extract:
        key: rds!db-hello-login-production-admin   # RDS-managed secret for production DB
    - extract:
        key: hello-login/production                 # manually-populated app secret
