name: Terraform CI

on:
  push:
    branches: [master]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'

defaults:
  run:
    working-directory: terraform

jobs:
  terraform-ci:
    name: Validate, lint, scan, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          # Skip checks that conflict with intentional design decisions:
          #   CKV_AWS_79  — IMDSv2 is enforced on the dev EC2 (http_tokens = "required")
          #   CKV_AWS_111 — ALB controller policy requires wildcard ECR auth token action
          #   CKV_AWS_356 — same wildcard resource for ecr:GetAuthorizationToken
          skip_check: CKV_AWS_79,CKV_AWS_111,CKV_AWS_356
          quiet: true

      - name: Terraform test
        run: terraform test
