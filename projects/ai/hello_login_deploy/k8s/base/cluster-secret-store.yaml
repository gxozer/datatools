# cluster-secret-store.yaml
#
# A ClusterSecretStore is a custom resource (CRD — Custom Resource Definition)
# introduced by the External Secrets Operator (ESO).
#
# It defines HOW the ESO connects to an external secrets provider — in this case
# AWS Secrets Manager. It is "Cluster"-scoped, meaning it is available to all
# namespaces in the cluster (unlike a SecretStore which is namespace-scoped).
#
# How the full secret flow works:
#   1. This ClusterSecretStore tells ESO: "to read secrets, connect to AWS
#      Secrets Manager in us-west-2 using the external-secrets service account."
#   2. The ExternalSecret objects in each overlay (staging/production) reference
#      this store and specify WHICH secrets to read.
#   3. ESO reads the secrets from AWS and writes them into Kubernetes Secrets.
#   4. Pods consume those Kubernetes Secrets via envFrom.secretRef.
#
# Acronyms:
#   ESO   — External Secrets Operator (Kubernetes controller)
#   CRD   — Custom Resource Definition (extends the Kubernetes API with new resource types)
#   IRSA  — IAM Roles for Service Accounts (AWS mechanism for pod-level IAM permissions)
#   JWT   — JSON Web Token (the token Kubernetes issues to authenticate service accounts)
#   IAM   — Identity and Access Management (AWS permission system)

apiVersion: external-secrets.io/v1beta1   # v1beta1 is the stable API in ESO v0.9.x
kind: ClusterSecretStore                  # cluster-wide (not namespace-scoped) secret store
                                          # (v1 was only promoted in ESO v0.10.0)
metadata:
  name: aws-secrets-manager   # referenced by name in ExternalSecret objects

spec:
  provider:
    aws:
      # The AWS service to read secrets from.
      # SecretsManager — AWS Secrets Manager (stores structured secret values as JSON).
      service: SecretsManager

      # The AWS region where the Secrets Manager secrets are stored.
      # Must match the region used in Terraform (modules/secrets/main.tf).
      region: us-west-2

      # auth — how ESO authenticates to AWS Secrets Manager.
      auth:
        jwt:
          # ESO uses IRSA (IAM Roles for Service Accounts) to authenticate.
          # It obtains a JWT (JSON Web Token) from Kubernetes for the service account
          # below, then exchanges it with AWS STS for temporary IAM credentials.
          # The IAM role and its permissions are defined in terraform/modules/iam/main.tf.
          serviceAccountRef:
            name: external-secrets       # the Kubernetes service account created by the ESO Helm chart
            namespace: external-secrets  # the namespace where ESO is installed
