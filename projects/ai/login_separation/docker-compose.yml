services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hello_login
      MYSQL_USER: hello
      MYSQL_PASSWORD: hello
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hello", "-phello"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  login-service:
    build: ./login-service
    image: hello-login-login
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5001:5001"
    env_file:
      - path: ./login-service/.env
        required: false
    environment:
      - FLASK_DEBUG=false
      - MAIL_SUPPRESS_SEND=${MAIL_SUPPRESS_SEND:-0}
      # WARNING: override JWT_SECRET for any non-localhost deployment (see .env.ec2.example)
      - JWT_SECRET=${JWT_SECRET:-dev-only-secret-change-for-production-32c}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://hello:hello@mysql:3306/hello_login}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - LOCKOUT_WINDOW_MINUTES=${LOCKOUT_WINDOW_MINUTES:-15}

  hello-service:
    build: ./hello-service
    image: hello-login-hello
    ports:
      - "5002:5002"
    environment:
      # WARNING: override JWT_SECRET for any non-localhost deployment (see .env.ec2.example)
      - JWT_SECRET=${JWT_SECRET:-dev-only-secret-change-for-production-32c}
      - PORT=5002
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}

  frontend:
    build: ./frontend
    image: hello-login-frontend
    ports:
      - "3000:8080"
    environment:
      - BACKEND_HOST=login-service
      - HELLO_BACKEND_HOST=hello-service
    depends_on:
      - login-service

volumes:
  mysql_data:
