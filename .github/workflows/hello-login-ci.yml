name: hello-login CI

on:
  push:
    paths:
      - "projects/ai/hello_login_deploy/**"
      - ".github/workflows/hello-login-ci.yml"
  pull_request:
    paths:
      - "projects/ai/hello_login_deploy/**"
      - ".github/workflows/hello-login-ci.yml"

defaults:
  run:
    working-directory: projects/ai/hello_login_deploy

jobs:
  backend-tests:
    name: Backend unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: projects/ai/hello_login_deploy/backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run unit and integration tests
        run: |
          backend/.venv/bin/python -m pytest tests/unit/ tests/integration/ -v --tb=short

  backend-container:
    name: Backend container build + structure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install container-structure-test
        run: |
          curl -fsSL -o container-structure-test \
            "https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64"
          echo "fa35e89512a8978585f76cf41397956d2e3a30c62c2ad3fb857b1597074d14ca  container-structure-test" | sha256sum -c -
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/container-structure-test

      - name: Build backend image
        run: docker build -t hello-login-backend ./backend

      - name: Run container structure tests
        run: container-structure-test test --image hello-login-backend --config tests/container/backend.yaml

  frontend-container:
    name: Frontend container build + structure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install container-structure-test
        run: |
          curl -fsSL -o container-structure-test \
            "https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64"
          echo "fa35e89512a8978585f76cf41397956d2e3a30c62c2ad3fb857b1597074d14ca  container-structure-test" | sha256sum -c -
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/container-structure-test

      - name: Build frontend image
        run: docker build -t hello-login-frontend ./frontend

      - name: Run container structure tests
        run: container-structure-test test --image hello-login-frontend --config tests/container/frontend.yaml

  e2e-tests:
    name: E2E tests (docker-compose stack)
    runs-on: ubuntu-latest
    needs: [backend-container, frontend-container]
    env:
      JWT_SECRET: ci-only-test-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + pytest
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest pytest-playwright playwright
          .venv/bin/playwright install chromium --with-deps

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for stack to be healthy
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done' \
            || { docker compose logs; exit 1; }

      - name: Run E2E tests
        run: E2E_BASE_URL=http://localhost:3000 .venv/bin/pytest tests/e2e/ -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
