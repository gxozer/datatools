# Reduces replicas to 1 and removes topologySpreadConstraints.
# k3s runs on a single node with no availability zones, so AZ-spread constraints
# would either prevent scheduling or be meaningless.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  template:
    spec:
      topologySpreadConstraints: []

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  template:
    spec:
      topologySpreadConstraints: []
