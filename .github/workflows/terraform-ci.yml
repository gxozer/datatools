name: Terraform CI

on:
  pull_request:
    paths:
      - "projects/ai/hello_login_deploy/terraform/**"
      - "projects/ai/login_separation/terraform/**"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: terraform init -backend=false
        working-directory: projects/ai/hello_login_deploy/terraform

      - name: terraform validate
        run: terraform validate
        working-directory: projects/ai/hello_login_deploy/terraform

  lint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Init tflint
        run: tflint --init
        working-directory: projects/ai/hello_login_deploy/terraform
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tflint
        run: tflint --recursive
        working-directory: projects/ai/hello_login_deploy/terraform

  security:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: projects/ai/hello_login_deploy/terraform
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_7,
            CKV_AWS_144,
            CKV_AWS_338,
            CKV_AWS_23,
            CKV_AWS_37,
            CKV_AWS_38,
            CKV_AWS_39,
            CKV_AWS_51,
            CKV_AWS_58,
            CKV_AWS_118,
            CKV_AWS_129,
            CKV_AWS_130,
            CKV_AWS_136,
            CKV_AWS_149,
            CKV_AWS_157,
            CKV_AWS_161,
            CKV_AWS_293,
            CKV_AWS_382,
            CKV2_AWS_5,
            CKV2_AWS_11,
            CKV2_AWS_12,
            CKV2_AWS_57,
            CKV2_AWS_69

  unit-test:
    name: terraform test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: terraform init -backend=false
        working-directory: projects/ai/hello_login_deploy/terraform

      - name: terraform test
        run: terraform test
        working-directory: projects/ai/hello_login_deploy/terraform

  # ── login_separation jobs ──────────────────────────────────────────────────

  ls-validate:
    name: login_separation — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: projects/ai/login_separation/terraform

      - name: terraform init
        run: terraform init -backend=false
        working-directory: projects/ai/login_separation/terraform

      - name: terraform validate
        run: terraform validate
        working-directory: projects/ai/login_separation/terraform

  ls-lint:
    name: login_separation — TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4

      - name: tflint init
        run: tflint --init
        working-directory: projects/ai/login_separation/terraform
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint --recursive
        working-directory: projects/ai/login_separation/terraform

  ls-security:
    name: login_separation — Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: projects/ai/login_separation/terraform
          framework: terraform
          quiet: true
          # Intentional design decisions (mirrors hello_login_deploy skips + login_separation specifics):
          #   CKV_AWS_23   — SG rules use source SG references; descriptions added where useful
          #   CKV_AWS_37   — EKS control plane logging not enabled (cost trade-off for dev/staging)
          #   CKV_AWS_38   — EKS public endpoint open to 0.0.0.0/0 in staging (FIXME in prod)
          #   CKV_AWS_39   — EKS public endpoint enabled intentionally for kubectl access
          #   CKV_AWS_51   — ECR tags are MUTABLE (latest tag is intentionally overwritten by CI)
          #   CKV_AWS_58   — EKS secrets not KMS-encrypted (cost trade-off)
          #   CKV_AWS_79   — IMDSv2 enforced on dev EC2 (http_tokens = required)
          #   CKV_AWS_111  — ALB controller IAM policy requires wildcard ECR auth token action
          #   CKV_AWS_118  — RDS enhanced monitoring not enabled (cost)
          #   CKV_AWS_129  — RDS logs not all enabled (cost)
          #   CKV_AWS_130  — Public subnets assign public IPs (required for ALB/NAT)
          #   CKV_AWS_136  — ECR not KMS-encrypted (default AES256 is acceptable)
          #   CKV_AWS_149  — Secrets Manager uses AWS-managed key (cost trade-off)
          #   CKV_AWS_157  — RDS Multi-AZ not enabled (cost; single-AZ acceptable for staging)
          #   CKV_AWS_161  — RDS IAM auth not enabled (password auth used intentionally)
          #   CKV_AWS_293  — RDS deletion_protection set per-environment via rds_prevent_destroy
          #   CKV_AWS_356  — ecr:GetAuthorizationToken requires wildcard resource
          #   CKV_AWS_382  — SG egress to 0.0.0.0/0 required for outbound internet (NAT GW)
          #   CKV2_AWS_5   — SGs are used by modules; Checkov can't resolve cross-module refs
          #   CKV2_AWS_11  — VPC flow logging not enabled (cost)
          #   CKV2_AWS_12  — Default SG not explicitly restricted (managed by EKS/VPC)
          #   CKV2_AWS_57  — Secrets Manager rotation not enabled (rotated manually)
          #   CKV2_AWS_69  — RDS encryption-in-transit via SSL handled at app layer
          skip_check: >-
            CKV_AWS_23,
            CKV_AWS_37,
            CKV_AWS_38,
            CKV_AWS_39,
            CKV_AWS_51,
            CKV_AWS_58,
            CKV_AWS_79,
            CKV_AWS_111,
            CKV_AWS_118,
            CKV_AWS_129,
            CKV_AWS_130,
            CKV_AWS_136,
            CKV_AWS_149,
            CKV_AWS_157,
            CKV_AWS_161,
            CKV_AWS_293,
            CKV_AWS_356,
            CKV_AWS_382,
            CKV2_AWS_5,
            CKV2_AWS_11,
            CKV2_AWS_12,
            CKV2_AWS_57,
            CKV2_AWS_69

  ls-unit-test:
    name: login_separation — terraform test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: terraform init
        run: terraform init -backend=false
        working-directory: projects/ai/login_separation/terraform

      - name: terraform test
        run: terraform test
        working-directory: projects/ai/login_separation/terraform
